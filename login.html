<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --card-bg: white;
            --text-primary: #212529;
        }
        [data-bs-theme="dark"] {
            --bg-primary: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
        }
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i {
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 15px;
        }
        .login-header h2 {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 5px;
        }
        .login-header p {
            color: #6c757d;
            font-size: 0.95rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ced4da;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        .btn-register {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #6c757d;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #ced4da;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            font-size: 1.3rem;
            color: #6c757d;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            color: #0d6efd;
        }
        .alert {
            border-radius: 10px;
            display: none;
        }
        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #6c757d;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
        <i class="bi bi-moon-stars"></i>
    </button>

    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-ticket-perforated-fill"></i>
            <h2>Sistema de Tickets</h2>
            <p>Gestión de incidencias de red con monitoreo SLA</p>
        </div>

        <div id="loginAlert" class="alert alert-danger"></div>
        <div id="successAlert" class="alert alert-success"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="usuario@empresa.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-login">
                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
            </button>
        </form>

        <div class="divider">o</div>

        <button onclick="showRegister()" class="btn btn-outline-secondary btn-register">
            <i class="bi bi-person-plus"></i> Crear Cuenta Nueva
        </button>

        <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" id="regEmail" class="form-control" placeholder="usuario@empresa.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="regPassword" class="form-control" placeholder Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="form-label">Confirmar Contraseña</label>
                <input type="password" id="regPasswordConfirm" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-success btn-login">
                <i class="bi bi-check-circle"></i> Registrarse
            </button>
            <button type="button" onclick="showLogin()" class="btn btn-link w-100">
                ← Volver a Iniciar Sesión
            </button>
        </form>

        <p class="footer-text">
            <i class="bi bi-shield-lock"></i> Sistema Seguro con Firebase Auth<br>
            Ing: Luis Alvarez © 2026
        </p>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ⚠️ REEMPLAZA CON TU CONFIGURACIÓN DE FIREBASE
        const firebaseConfig = {
            apiKey: "TU_API_KEY_AQUI",
            authDomain: "tu-proyecto.firebaseapp.com",
            projectId: "tu-proyecto",
            storageBucket: "tu-proyecto.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Verificar si ya está logueado
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        window.handleLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('loginAlert');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                mostrarAlerta('success', '✅ Iniciando sesión...');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (error) {
                mostrarAlerta('danger', '❌ ' + limpiarError(error.message));
            }
        };

        window.handleRegister = async function(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;
            const alertBox = document.getElementById('successAlert');

            if (password !== confirm) {
                mostrarAlerta('danger', '❌ Las contraseñas no coinciden');
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Guardar usuario en Firestore
                await setDoc(doc(db, "users", user.uid), {
                    email: user.email,
                    nombre: email.split('@')[0],
                    rol: 'operador',
                    createdAt: new Date()
                });

                mostrarAlerta('success', '✅ Cuenta creada. Redirigiendo...');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (error) {
                mostrarAlerta('danger', '❌ ' + limpiarError(error.message));
            }
        };

        function mostrarAlerta(tipo, mensaje) {
            const alertBox = tipo === 'success' ? 
                document.getElementById('successAlert') : 
                document.getElementById('loginAlert');
            alertBox.className = `alert alert-${tipo}`;
            alertBox.innerHTML = mensaje;
            alertBox.style.display = 'block';
            setTimeout(() => alertBox.style.display = 'none', 5000);
        }

        function limpiarError(msg) {
            return msg.replace('Firebase: ', '').replace('Error: ', '');
        }

        window.showRegister = function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        };

        window.showLogin = function() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        };

        window.toggleTheme = function() {
            const html = document.documentElement;
            const current = html.getAttribute('data-bs-theme');
            const nuevo = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', nuevo);
            localStorage.setItem('theme', nuevo);
        };

        // Cargar tema guardado
        const temaGuardado = localStorage.getItem('theme');
        if (temaGuardado) {
            document.documentElement.setAttribute('data-bs-theme', temaGuardado);
        }
    </script>
</body>
</html>
